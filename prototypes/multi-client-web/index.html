{id:'issuer',title:'02 · 凭证签发平台',desc:'组织业务人员设计模板、发起签发并管理生命周期',base:'/issuer',org:'华信技能认证中心 · 王宁',menus:['工作概览','模板中心','签发任务','凭证管理','领取跟踪','统计报表','签发设置'],pages:[
['工作概览','掌握签发量、领取率、任务和异常','概览'],['模板中心','管理预置与自定义凭证模板','列表'],['新建/编辑模板','配置字段、规则、有效期和披露策略','模板','模板中心'],['签发任务','查看草稿、复核中、签发中和已完成任务','任务'],['新建签发任务','单个录入或批量导入持证人数据','表单','签发任务'],['数据复核与签名','修正错误、二次确认并执行签发','复核','签发任务'],['凭证管理','查询、暂停、恢复、撤销和重新签发','凭证'],['凭证详情','查看凭证内容、领取和生命周期记录','详情','凭证管理'],['领取跟踪','提醒待领取用户并处理过期领取邀请','跟踪'],['统计报表','分析模板使用量、签发量和领取率','报表'],['签发设置','配置签发 DID、审批流程和默认策略','设置']]},

{id:'admin',title:'04 · 平台管理中心',desc:'平台和组织管理员治理租户、权限、DID、互信与审计',base:'/admin',org:'平台管理员',menus:['运行总览','组织管理','部门管理','成员与权限','角色管理','DID 管理','互信策略','审计中心','系统设置','备份与恢复'],pages:[
['运行总览','查看组织、用户、DID、凭证和服务健康度','概览'],['组织管理','创建组织并配置签发或验证能力','组织'],['组织详情','查看组织资料、能力、DID 和运行统计','详情','组织管理'],['部门管理','维护组织层级和部门负责人','部门'],['成员与权限','邀请成员并授权访问指定客户端','成员'],['角色管理','配置平台、组织和业务角色权限','角色'],['DID 管理','创建、解析、更新、轮换和停用 DID','DID'],['DID 详情','查看 DID Document、密钥版本和生命周期','详情','DID 管理'],['互信策略','配置组织互认、凭证类型和验证约束','互信'],['审计中心','查询高风险操作和跨组织业务记录','审计'],['系统设置','管理平台参数、会话、安全和通知','设置'],['备份与恢复','创建本地备份并执行恢复演练','备份']]}

function side(c,active){return `<aside class="side"><small>${c.title.replace(/^\d+ · /,'')}</small>${c.menus.map(x=>`<span class="${x===active?'on':''}">${x}</span>`).join('')}</aside>`}
function content(type,title){const rows=`<table><tr><th>名称 / 对象</th><th>所属组织</th><th>更新时间</th><th>状态</th><th>操作</th></tr><tr><td><b>${title}示例记录 A</b></td><td>华信技能认证中心</td><td>2026-07-13 14:32</td><td><span class="tag">正常</span></td><td>查看 · 编辑</td></tr><tr><td><b>${title}示例记录 B</b></td><td>远航科技有限公司</td><td>2026-07-12 09:18</td><td><span class="tag blue">处理中</span></td><td>查看 · 处理</td></tr></table>`;
if(type==='概览')return `<div class="cards"><div class="card"><small>全部数据</small><b>2,416</b></div><div class="card"><small>本月新增</small><b>286</b></div><div class="card"><small>待处理</small><b>17</b></div><div class="card"><small>异常提醒</small><b>2</b></div></div><div class="grid"><div class="panel"><h4>近期业务</h4>${rows}</div><div class="panel"><h4>待办与提醒</h4><p>● 有 2 项业务数据需要复核</p><p>● 1 个授权将在 7 天内到期</p><p>● 局域网服务运行正常</p></div></div>`;
if(['列表','记录','任务','凭证','跟踪','组织','部门','成员','角色','DID','审计','机构'].includes(type))return `<div class="panel" style="margin-bottom:12px"><button class="btn">全部状态⌄</button><button class="btn">搜索关键词</button><button class="btn pri" style="float:right">＋ 新建 / 发起</button></div>${rows}`;
if(['表单','模板','设置','安全','策略','互信','请求'].includes(type))return `<div class="grid"><div class="panel"><h4>基本配置</h4><div class="field">名称 / 业务场景</div><div class="field">所属组织 / 部门⌄</div><div class="field">有效期与状态规则⌄</div><div class="field">说明与使用目的</div></div><div class="panel"><h4>规则与权限</h4><p>☑ 启用状态检查　☑ 检查签发方可信度</p><p>☑ 记录审计日志　☐ 允许跨组织访问</p><div class="field">可访问角色⌄</div><button class="btn">保存草稿</button><button class="btn pri">保存并启用</button></div></div>`;
if(type==='详情')return `<div class="grid"><div class="panel"><h4>${title}</h4><p>唯一标识：DIDS-20260713-001</p><p>所属组织：华信技能认证中心</p><p>创建时间：2026-06-30 09:20</p><p>当前状态：<span class="tag">有效</span></p></div><div class="panel"><h4>生命周期记录</h4><p>2026-06-30　创建并签名</p><p>2026-06-30　持证人确认领取</p><p>2026-07-13　完成一次有效验证</p></div></div><div class="panel" style="margin-top:12px"><h4>结构化数据 / 技术信息</h4><div class="field">{ "id": "DIDS-20260713-001", "status": "active", "proof": { ... } }</div></div>`;
if(type==='失败')return `<div class="result bad"><h3>✕ 验证未通过</h3><p>该凭证已被签发机构撤销，不能继续用于本次业务。</p></div><div class="grid"><div class="panel"><h4>失败原因</h4><p>凭证状态：已撤销</p><p>撤销时间：2026-07-12 18:30</p><p>其他检查：格式、签名和签发方均正常</p></div><div class="panel"><h4>处理建议</h4><p>请持证人联系原签发机构获取最新凭证。</p><button class="btn">保存报告</button></div></div>`;
if(type==='成功')return `<div class="result"><h3>✓ 凭证真实有效</h3><p>签名、签发机构、有效期、状态和披露证明全部通过。</p></div><div class="cards" style="margin-top:12px"><div class="card">✓ 格式正确</div><div class="card">✓ 签名有效</div><div class="card">✓ 机构可信</div><div class="card">✓ 未被撤销</div></div>`;

if(['领取','确认','授权','复核','批量','备份','核验'].includes(type))return `<div class="grid"><div class="panel"><h4>${title}</h4><div class="drop">拖入文件 / 扫描二维码 / 输入业务代码</div><div class="field">业务对象或凭证类型⌄</div><div class="field">处理方式与策略⌄</div></div><div class="panel"><h4>处理预览</h4><p>已识别 200 条 · 198 条通过 · 2 条需处理</p><p>系统将执行签名、状态和权限校验。</p><button class="btn">保存草稿</button><button class="btn pri">确认并继续</button></div></div>`;
if(type==='报表')return `<div class="cards"><div class="card"><small>签发总量</small><b>2,416</b></div><div class="card"><small>领取率</small><b>94.8%</b></div><div class="card"><small>验证次数</small><b>8,924</b></div><div class="card"><small>撤销率</small><b>0.7%</b></div></div><div class="panel" style="margin-top:12px"><h4>近 12 个月业务趋势</h4><div class="diagram"><div>1月<br>▂</div><div>3月<br>▃</div><div>5月<br>▅</div><div>7月<br>▇</div><div>9月<br>▆</div><div>12月<br>█</div></div></div>`;
return `<div class="panel"><h4>${title}</h4><p>该页面用于完成“${title}”相关操作，并提供状态提示、权限检查和审计记录。</p>${rows}</div>`}
function render(){document.querySelector('#root').innerHTML=clients.map(c=>`<section class="client" id="${c.id}"><h2>${c.title}</h2><p class="desc">${c.desc}</p><div class="map">${c.menus.map(x=>`<span>${x}</span>`).join('')}</div>${c.pages.map((p,i)=>{let active=p[3]||p[0];return `<article class="screen"><div class="browser">●　●　●　　http://dids.local${c.base}/${i+1}</div><div class="bar"><span class="brand">信证台 · ${c.title.replace(/^\d+ · /,'')}</span><span>${c.org}　⌄</span></div><div class="shell">${side(c,active)}<main class="main"><div class="head"><div><h3>${p[0]}</h3><p>${p[1]}</p></div><div class="actions"><button class="btn">帮助</button><button class="btn pri">主要操作</button></div></div>${content(p[2],p[0])}</main></div></article>`}).join('')}</section>`).join('')};render();
